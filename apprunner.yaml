# AWS App Runner 설정
# https://docs.aws.amazon.com/apprunner/latest/dg/config-file.html
version: 1.0
runtime: python311
build:
  commands:
    pre-build:
      - echo "Installing dependencies..."
    build:
      - pip install -r requirements.txt
    post-build:
      - python fetch_data.py
run:
  runtime-version: 3.11
  command: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
  network:
    port: 8080
    env: PORT
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: FLASK_ENV
      value: production
    # KAKAO_REST_API_KEY는 App Runner 콘솔에서 secret으로 설정
