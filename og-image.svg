<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1f45"/>
      <stop offset="60%" stop-color="#1a52cc"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feOffset in="blur" dx="0" dy="3" result="off"/>
      <feMerge>
        <feMergeNode in="off"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Watermark Korean character -->
  <text x="1100" y="500" font-family="serif" font-size="450" fill="#fff" opacity="0.05" text-anchor="end" font-weight="900">韓</text>

  <!-- Logo / brand -->
  <text x="80" y="120" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="14" fill="#FF6B35" letter-spacing="5" font-weight="700">▎ POWERED BY WEHOME · KOREA</text>

  <!-- Main title -->
  <text x="80" y="220" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="86" fill="#fff" font-weight="900" letter-spacing="-2" filter="url(#shadow)">
    <tspan fill="#FF6B35">K</tspan>-STAY
  </text>

  <!-- Subtitle -->
  <text x="80" y="280" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="32" fill="#fff" font-weight="700" letter-spacing="-0.5">Get the best stay for you in Korea</text>

  <!-- Description -->
  <text x="80" y="335" font-family="-apple-system, 'SF Pro Display', sans-serif" font-size="20" fill="rgba(255,255,255,0.85)" letter-spacing="0">한국 모든 합법 숙박·관광·문화 데이터 종합 AI 비서</text>

  <!-- Stats grid -->
  <g transform="translate(80, 410)">
    <rect width="240" height="100" rx="14" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
    <text x="20" y="42" font-size="34" fill="#FF6B35" font-weight="900">50,000+</text>
    <text x="20" y="72" font-size="14" fill="#fff" opacity="0.85">검증 숙박 데이터</text>

    <rect x="260" width="240" height="100" rx="14" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
    <text x="280" y="42" font-size="34" fill="#FF6B35" font-weight="900">11종</text>
    <text x="280" y="72" font-size="14" fill="#fff" opacity="0.85">숙박 카테고리</text>

    <rect x="520" width="240" height="100" rx="14" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
    <text x="540" y="42" font-size="34" fill="#FF6B35" font-weight="900">16개</text>
    <text x="540" y="72" font-size="14" fill="#fff" opacity="0.85">MCP 도구 (Claude·Cursor)</text>

    <rect x="780" width="240" height="100" rx="14" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
    <text x="800" y="42" font-size="34" fill="#FF6B35" font-weight="900">100%</text>
    <text x="800" y="72" font-size="14" fill="#fff" opacity="0.85">무료 · 인증 불필요</text>
  </g>

  <!-- Bottom URL -->
  <text x="80" y="585" font-family="'SF Mono', monospace" font-size="20" fill="rgba(255,255,255,0.7)" font-weight="600">k-stay.ai</text>

  <!-- Right badge -->
  <g transform="translate(950, 555)">
    <rect width="170" height="50" rx="25" fill="#FF6B35"/>
    <text x="85" y="32" font-size="16" fill="#fff" font-weight="800" text-anchor="middle">Open Source · MIT</text>
  </g>
</svg>
