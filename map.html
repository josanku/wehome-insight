<script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=d57298b5648cef7e88c9f7bec9b24e74&autoload=false&libraries=clusterer"></script>
<script>
let map=null, clusterer=null, allData=[], filteredData=[], markers=[], byMgt=new Map(), selectedMarker=null;

function loadKakao(){
  return new Promise((resolve,reject)=>{
    if(typeof kakao === 'undefined') return reject(new Error('Kakao SDK 미로드'));
    kakao.maps.load(resolve);
  });
}

async function init(){
  document.getElementById('loader').classList.add('show');
  await loadKakao();
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(36.5, 127.8),
    level: 13
  });
  clusterer = new kakao.maps.MarkerClusterer({
    map, averageCenter: true, minLevel: 6, gridSize: 60,
    styles:[{
      width:'40px',height:'40px',background:'rgba(26,82,204,.85)',color:'#fff',
      textAlign:'center',lineHeight:'40px',borderRadius:'50%',fontSize:'13px',fontWeight:'700',
      border:'3px solid rgba(255,255,255,.6)'
    },{
      width:'50px',height:'50px',background:'rgba(13,31,69,.9)',color:'#fff',
      textAlign:'center',lineHeight:'50px',borderRadius:'50%',fontSize:'14px',fontWeight:'700',
      border:'3px solid rgba(255,255,255,.6)'
    },{
      width:'60px',height:'60px',background:'rgba(255,107,53,.9)',color:'#fff',
      textAlign:'center',lineHeight:'60px',borderRadius:'50%',fontSize:'15px',fontWeight:'800',
      border:'3px solid rgba(255,255,255,.6)'
    }]
  });

  // 헤더 통계
  const stats = await fetch('/api/stats').then(r=>r.json());
  const analysis = await fetch('/api/analysis').then(r=>r.json());
  document.getElementById('sbStats').innerHTML =
    `전체 영업중 <strong>${stats.active.toLocaleString()}</strong>명 · 최근 1년 활성 <strong>${analysis.recent_active.toLocaleString()}</strong>명`;

  // 시도 옵션 채우기
  const national = await fetch('/api/national').then(r=>r.json());
  const sidoSel = document.getElementById('fSido');
  national.forEach(s=>{
    if(s.sido && s.active>0) sidoSel.innerHTML += `<option value="${s.sido}">${s.sido} (${s.active.toLocaleString()})</option>`;
  });

  await loadData();
  document.getElementById('loader').classList.remove('show');

  // 이벤트
  document.getElementById('fSido').addEventListener('change', onSidoChange);
  document.getElementById('fSigungu').addEventListener('change', applyFilter);
  document.getElementById('fSearch').addEventListener('input', debounce(applyFilter, 300));
  document.getElementById('fRecent').addEventListener('change', loadData);
}

async function loadData(){
  document.getElementById('loader').classList.add('show');
  const recent = document.getElementById('fRecent').checked;
  const res = await fetch(`/api/all-locations?recent_only=${recent}`).then(r=>r.json());
  allData = res.data;
  byMgt.clear();
  applyFilter();
  document.getElementById('loader').classList.remove('show');
}

async function onSidoChange(){
  const sido = document.getElementById('fSido').value;
  const sigunguSel = document.getElementById('fSigungu');
  sigunguSel.innerHTML = '<option value="">전체</option>';
  if(sido){
    const dists = await fetch(`/api/districts?sido=${encodeURIComponent(sido)}`).then(r=>r.json());
    dists.forEach(d=>{
      if(d.active>0) sigunguSel.innerHTML += `<option value="${d.sigungu}">${d.sigungu} (${d.active})</option>`;
    });
  }
  applyFilter();
}

function applyFilter(){
  const sido = document.getElementById('fSido').value;
  const sigungu = document.getElementById('fSigungu').value;
  const q = document.getElementById('fSearch').value.trim().toLowerCase();

  filteredData = allData.filter(h=>{
    if(sido && h.sido !== sido) return false;
    if(sigungu && h.sigungu !== sigungu) return false;
    if(q && !(h.biz_name||'').toLowerCase().includes(q) && !(h.road_address||'').toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('filteredCount').textContent = filteredData.length.toLocaleString();
  document.getElementById('visibleCount').textContent = filteredData.length.toLocaleString();

  renderMarkers();
  renderList();

  // bounds 자동 조정
  if(filteredData.length > 0 && (sido || sigungu || q)){
    const bounds = new kakao.maps.LatLngBounds();
    filteredData.forEach(h => bounds.extend(new kakao.maps.LatLng(h.lat, h.lng)));
    map.setBounds(bounds);
  }
}

function renderMarkers(){
  if(clusterer) clusterer.clear();
  markers = [];
  byMgt.clear();

  // 너무 많으면 샘플링 (10000개 이상)
  const data = filteredData.length > 15000 ? filteredData.slice(0, 15000) : filteredData;

  data.forEach(h=>{
    const marker = new kakao.maps.Marker({
      position: new kakao.maps.LatLng(h.lat, h.lng),
      image: new kakao.maps.MarkerImage(
        'data:image/svg+xml;base64,' + btoa(`<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="7" fill="#FF6B35" stroke="#fff" stroke-width="2"/></svg>`),
        new kakao.maps.Size(20,20), {offset: new kakao.maps.Point(10,10)}
      )
    });
    kakao.maps.event.addListener(marker, 'click', ()=>showDetail(h, marker));
    markers.push(marker);
    byMgt.set(h.id, marker);
  });
  clusterer.addMarkers(markers);
}

function renderList(){
  const list = document.getElementById('hostList');
  // 최대 200개만 사이드바에 표시
  const show = filteredData.slice(0, 200);
  list.innerHTML = show.map(h=>{
    return `<div class="host-item" data-id="${h.id}" onclick='focusHost(${JSON.stringify(h).replace(/'/g,"&apos;")})'>
      <div class="host-name">${h.biz_name||'-'}</div>
      <div class="host-addr">${h.road_address||h.parcel_address||''}</div>
      <div class="host-meta">${h.sido} ${h.sigungu} · 객실 ${h.rooms||'?'}실 · 등록 ${h.license_date||''}</div>
    </div>`;
  }).join('') + (filteredData.length > 200 ? `<div style="text-align:center;padding:14px;color:#aaa;font-size:11px">... 외 ${(filteredData.length-200).toLocaleString()}건 (지도에서 확인)</div>` : '');
}

function focusHost(h){
  const pos = new kakao.maps.LatLng(h.lat, h.lng);
  map.setLevel(2);
  map.panTo(pos);
  const marker = byMgt.get(h.id);
  if(marker) showDetail(h, marker);
}

function showDetail(h, marker){
  document.getElementById('detail').classList.add('show');
  document.getElementById('dName').textContent = h.biz_name||'-';
  document.getElementById('dLoc').textContent = `${h.sido||''} ${h.sigungu||''} ${h.dong||''}`;
  document.getElementById('dRoadAddr').textContent = h.road_address||'-';
  document.getElementById('dParcelAddr').textContent = h.parcel_address||'-';
  document.getElementById('dMgtNo').textContent = h.mgt_no||'-';
  document.getElementById('dLicense').textContent = h.license_date||'-';
  document.getElementById('dRooms').textContent = (h.rooms||'?') + '실';
  document.getElementById('dPhone').textContent = h.phone||'-';
  document.getElementById('dUpdate').textContent = (h.update_at||'-').substring(0,16);

  // 선택 마커 강조
  if(selectedMarker !== marker){
    selectedMarker = marker;
  }

  // 사이드바 리스트에서도 강조
  document.querySelectorAll('.host-item').forEach(el => el.classList.remove('selected'));
  const sel = document.querySelector(`.host-item[data-id="${h.id}"]`);
  if(sel) {
    sel.classList.add('selected');
    sel.scrollIntoView({block:'nearest', behavior:'smooth'});
  }
}

function closeDetail(){
  document.getElementById('detail').classList.remove('show');
}

function debounce(fn, ms){
  let t; return (...a) => { clearTimeout(t); t = setTimeout(()=>fn(...a), ms); };
}

init().catch(e=>{
  alert('초기화 오류: '+e.message);
  document.getElementById('loader').classList.remove('show');
});
</script>
</body>
</html>
