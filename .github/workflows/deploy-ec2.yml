name: Deploy to k-stay.ai (EC2)

# main에 push되면 wehome-seoul EC2로 SSH 접속해서 git pull + systemctl restart
#
# 필요한 GitHub Secrets:
#   EC2_SSH_KEY      : ~/.security/wehome_seoul.pem 내용 (PEM private key 전체)
#   EC2_HOST         : 3.35.68.185 (또는 k-stay.ai)
#   EC2_USER         : ubuntu
#
# Settings → Secrets and variables → Actions → New repository secret

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**.md'
  workflow_dispatch:

concurrency:
  group: deploy-k-stay
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST:    ${{ secrets.EC2_HOST }}
          EC2_USER:    ${{ secrets.EC2_USER }}
        run: |
          if [ -z "$EC2_SSH_KEY" ] || [ -z "$EC2_HOST" ] || [ -z "$EC2_USER" ]; then
            echo "::warning::EC2_SSH_KEY/EC2_HOST/EC2_USER secrets 미설정. 자동 배포 스킵."
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$EC2_SSH_KEY" > ~/.ssh/k-stay.pem
          chmod 600 ~/.ssh/k-stay.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i ~/.ssh/k-stay.pem "${EC2_USER}@${EC2_HOST}" <<'REMOTE'
          set -e
          cd /home/kstay/k-stay-app
          echo "▸ git pull"
          git pull --ff-only origin main
          echo "▸ pip install (changed deps만)"
          .venv/bin/pip install -r requirements.txt --quiet
          echo "▸ systemctl restart k-stay"
          sudo systemctl restart k-stay
          sleep 2
          sudo systemctl status k-stay --no-pager | head -8
          echo "▸ live check"
          curl -fsS -o /dev/null -w 'HTTP %{http_code}\n' http://127.0.0.1:8081/api/stats
          REMOTE

      - name: Verify production
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w '%{http_code}' https://k-stay.ai/api/stats)
            echo "[$i] https://k-stay.ai/api/stats → $code"
            [ "$code" = "200" ] && exit 0
            sleep 3
          done
          echo "::error::Production smoke test failed"
          exit 1
